<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="Al Corriente">
  <defs>
    <style>
      .name{font-family:Georgia,'Times New Roman',serif;font-weight:900;fill:#1f3a5f;letter-spacing:2px}
      .tag{font-family:Arial,Helvetica,sans-serif;fill:#9e7b41;letter-spacing:6px;font-size:15px}
      .sub{font-family:Arial,Helvetica,sans-serif;fill:#666;letter-spacing:2px;font-size:12px}
    </style>
  </defs>
  <rect width="640" height="200" fill="#faf8f3"/>
  <!-- emblem: two sources (arcs) converging into one point -->
  <g transform="translate(320,40)">
    <!-- left source -->
    <circle cx="-24" cy="-26" r="4.5" fill="#1f3a5f"/>
    <path d="M-24,-21 C-24,-6 -12,-2 0,6" fill="none" stroke="#9e7b41" stroke-width="3.2" stroke-linecap="round"/>
    <!-- right source -->
    <circle cx="24" cy="-26" r="4.5" fill="#1f3a5f"/>
    <path d="M24,-21 C24,-6 12,-2 0,6" fill="none" stroke="#9e7b41" stroke-width="3.2" stroke-linecap="round"/>
    <!-- converge into one drop -->
    <path d="M0,6 C-6,14 -6,22 0,26 C6,22 6,14 0,6 Z" fill="#1f3a5f"/>
  </g>
  <line x1="150" y1="80" x2="490" y2="80" stroke="#1f3a5f" stroke-width="1"/>
  <text x="320" y="132" text-anchor="middle" class="name" font-size="54">AL CORRIENTE</text>
  <text x="320" y="162" text-anchor="middle" class="tag">VERIFICADO EN ORIGEN</text>
  <line x1="235" y1="178" x2="405" y2="178" stroke="#e2ddd3" stroke-width="1"/>
  <text x="320" y="194" text-anchor="middle" class="sub">DIARIO NACIONAL · ESPAÑA</text>
</svg>
